# Project identification
sonar.projectKey=legend-pure
sonar.organization=finos
sonar.projectName=Legend Pure

# Source configuration
sonar.sources=.
sonar.inclusions=**/src/main/java/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/src/test/java/**

# Binaries (standard Maven compiled output)
sonar.java.binaries=artifacts/
sonar.java.libraries=artifacts/

# Encoding
sonar.sourceEncoding=UTF-8

